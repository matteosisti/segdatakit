dataset:
  name: coco
  num_classes: 133
  ignore_index: 255
  splits:
    - train   # 118287 images
    - val     # 5000 images

  # COCO panoptic uses 1-indexed, non-contiguous category ids.
  # This map remaps to 0-indexed contiguous train ids (0..132).
  # Generated from the official COCO panoptic category list.
  # Things: 80 categories (1-90, non-contiguous)
  # Stuff:  53 categories (92-200, non-contiguous)
  label_map:
    1:   0    # person
    2:   1    # bicycle
    3:   2    # car
    4:   3    # motorcycle
    5:   4    # airplane
    6:   5    # bus
    7:   6    # train
    8:   7    # truck
    9:   8    # boat
    10:  9    # traffic light
    11:  10   # fire hydrant
    13:  11   # stop sign
    14:  12   # parking meter
    15:  13   # bench
    16:  14   # bird
    17:  15   # cat
    18:  16   # dog
    19:  17   # horse
