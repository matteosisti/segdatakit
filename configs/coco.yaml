storage:
  format: zarr
  compression: lz4
  chunk_size: 1

paths:
  raw: /data/coco
  output: /data/coco.zarr

validation:
  n_audit_samples: 100
  audit_seed: 42
  min_valid_pixel_fraction: 0.20   # COCO has more crowd/ignore regions
  max_aspect_ratio_distortion: 0.05
