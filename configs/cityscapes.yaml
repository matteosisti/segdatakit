dataset:
  name: cityscapes
  num_classes: 19
  ignore_index: 255
  splits:
    - train   # 2975 images
    - val     # 500 images

  # Remapping from raw labelIds (0-33) to trainIds (0-18, 255=ignore)
  # Source: https://github.com/mcordts/cityscapesScripts
  label_map:
    0:   255  # unlabeled
    1:   255  # ego vehicle
    2:   255  # rectification border
    3:   255  # out of roi
    4:   255  # static
    5:   255  # dynamic
    6:   255  # ground
    7:   0    # road
    8:   1    # sidewalk
    9:   255  # parking
    10:  255  # rail track
    11:  2    # building
    12:  3    # wall
    13:  4    # fence
    14:  255  # guard rail
    15:  255  # bridge
    16:  255  # tunnel
    17:  5    # pole
    18:  255  # polegroup  <- ignore: merged into pole at eval time
    19:  6    # traffic light
    20:  7    # traffic sign
    21:  8    # vegetation
    22:  9    # terrain
    23:  10   # sky
    24:  11   # person
    25:  12   # rider
    26:  13   # car
    27:  14   # truck
    28:  15   # bus
    29:  255  # caravan
    30:  255  # trailer
    31:  16   # train
    32:  17   # motorcycle
    33:  18   # bicycle

  # Per-class metadata — trainId indexed (0..18)
  classes:
    - {train_id: 0,  name: road,          category: flat,         category_id: 1, has_instances: false, color: [128,  64, 128]}
    - {train_id: 1,  name: sidewalk,      category: flat,         category_id: 1, has_instances: false, color: [244,  35, 232]}
    - {train_id: 2,  name: building,      category: construction, category_id: 2, has_instances: false, color: [ 70,  70,  70]}
    - {train_id: 3,  name: wall,          category: construction, category_id: 2, has_instances: false, color: [102, 102, 156]}
    - {train_id: 4,  name: fence,         category: construction, category_id: 2, has_instances: false, color: [190, 153, 153]}
    - {train_id: 5,  name: pole,          category: object,       category_id: 3, has_instances: false, color: [153, 153, 153]}
    - {train_id: 6,  name: traffic light, category: object,       category_id: 3, has_instances: false, color: [250, 170,  30]}
    - {train_id: 7,  name: traffic sign,  category: object,       category_id: 3, has_instances: false, color: [220, 220,   0]}
    - {train_id: 8,  name: vegetation,    category: nature,       category_id: 4, has_instances: false, color: [107, 142,  35]}
    - {train_id: 9,  name: terrain,       category: nature,       category_id: 4, has_instances: false, color: [152, 251, 152]}
    - {train_id: 10, name: sky,           category: sky,          category_id: 5, has_instances: false, color: [ 70, 130, 180]}
    - {train_id: 11, name: person,        category: human,        category_id: 6, has_instances: true,  color: [220,  20,  60]}
    - {train_id: 12, name: rider,         category: human,        category_id: 6, has_instances: true,  color: [255,   0,   0]}
    - {train_id: 13, name: car,           category: vehicle,      category_id: 7, has_instances: true,  color: [  0,   0, 142]}
    - {train_id: 14, name: truck,         category: vehicle,      category_id: 7, has_instances: true,  color: [  0,   0,  70]}
    - {train_id: 15, name: bus,           category: vehicle,      category_id: 7, has_instances: true,  color: [  0,  60, 100]}
    - {train_id: 16, name: train,         category: vehicle,      category_id: 7, has_instances: true,  color: [  0,  80, 100]}
    - {train_id: 17, name: motorcycle,    category: vehicle,      category_id: 7, has_instances: true,  color: [  0,   0, 230]}
    - {train_id: 18, name: bicycle,       category: vehicle,      category_id: 7, has_instances: true,  color: [119,  11,  32]}

  # Flat list — trainId order
  class_names:
    - road         # 0
    - sidewalk     # 1
    - building     # 2
    - wall         # 3
    - fence        # 4
    - pole         # 5
    - traffic light  # 6
    - traffic sign   # 7
    - vegetation   # 8
    - terrain      # 9
    - sky          # 10
    - person       # 11
    - rider        # 12
    - car          # 13
    - truck        # 14
    - bus          # 15
    - train        # 16
    - motorcycle   # 17
    - bicycle      # 18

  # Category groupings — useful for per-category mIoU breakdown in report
  categories:
    flat:         [0, 1]
    construction: [2, 3, 4]
    object:       [5, 6, 7]
    nature:       [8, 9]
    sky:          [10]
    human:        [11, 12]
    vehicle:      [13, 14, 15, 16, 17, 18]

  # Instance-capable classes
  instance_classes: [11, 12, 13, 14, 15, 16, 17, 18]

storage:
  format: zarr
  compression: lz4
  chunk_size: 1

paths:
  raw: /data/cityscapes
  output: /data/cityscapes.zarr

validation:
  n_audit_samples: 100
  audit_seed: 42
  min_valid_pixel_fraction: 0.30
  max_aspect_ratio_distortion: 0.05